<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ page.description }}">
    <link rel="canonical" href="{{ site.url }}{{ page.url }}">
</head>
<body>
    <header>
        <nav>
            <a href="/">{{ site.title }}</a>
            <a href="/about.html">About</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; 2026 {{ site.title }}. All rights reserved.</p>
        <p><a href="https://womanlvbag.com">womanlvbag.com</a></p>
    </footer>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 900px; margin: 0 auto; padding: 20px; background: #fafafa; }
        header { background: #1a1a1a; color: #fff; padding: 20px 0; margin-bottom: 40px; }
        nav { max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        nav a { color: #fff; text-decoration: none; font-weight: 500; }
        h1 { font-size: 2em; margin-bottom: 20px; color: #1a1a1a; }
        h2 { font-size: 1.5em; margin: 30px 0 15px; color: #1a1a1a; }
        p { margin-bottom: 15px; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
        ul { margin-left: 25px; margin-bottom: 15px; }
        li { margin-bottom: 8px; }
        table { border-collapse: collapse; width: 100%; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f5f5f5; }
        code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; }
        footer { text-align: center; margin-top: 50px; padding-top: 20px; border-top: 1px solid #eee; color: #666; }
        .post-meta { color: #999; font-size: 0.9em; margin-bottom: 20px; }
        .brand-tag { background: #0066cc; color: white; padding: 3px 8px; border-radius: 3px; font-size: 0.8em; }
    </style>
</body>
</html>
