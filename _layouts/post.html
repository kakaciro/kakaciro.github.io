---
layout: default
---
<article>
    <header>
        <h1>{{ page.title }}</h1>
        <p class="date">{{ page.date | date: "%Y-%m-%d" }}</p>
{% if page.categories %}
        <p class="categories">Categories: {% for cat in page.categories %}<a href="/category/{{ cat }}.html">{{ cat }}</a> {% endfor %}</p>
{% endif %}
    </header>
    <div class="content">
        {{ content }}
    </div>
    <footer>
        <p><a href="/">← Back to Home</a></p>
        <p><a href="https://womanlvbag.com">womanlvbag.com</a></p>
    </footer>
</article>

<style>
    article { max-width: 700px; margin: 0 auto; padding: 0 20px; }
    header { margin-bottom: 40px; }
    h1 { font-size: 1.8em; color: #1a1a1a; margin-bottom: 10px; }
    .date { color: #999; font-size: 0.9em; }
    .categories { margin-top: 10px; font-size: 0.9em; }
    .categories a { color: #0066cc; margin-right: 10px; }
    .content h2 { margin: 30px 0 15px; color: #1a1a1a; }
    .content p { margin-bottom: 15px; line-height: 1.8; }
    .content table { border-collapse: collapse; width: 100%; margin: 20px 0; }
    .content th, .content td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    .content th { background: #f5f5f5; }
    footer { margin-top: 50px; padding-top: 20px; border-top: 1px solid #eee; color: #666; }
    footer a { color: #0066cc; }
</style>
